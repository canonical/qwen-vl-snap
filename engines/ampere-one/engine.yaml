name: ampere-one
summary: Optimized for Ampere One CPUs
description: This engine uses llama-aio (Ampere® optimized llama.cpp).
vendor: Ampere Computing
devices:
  anyof:
    - type: cpu
      architecture: arm64
      implementer-id: 0xc0 # Ampere Computing
      part-number: 0xac3   # One/Siryn
    - type: cpu
      architecture: arm64
      implementer-id: 0xc0 # Ampere Computing
      part-number: 0xac4   # 1A/OneX/OneM/Banshee

runtime: llama-aio-ampereone

model:
  default: qwen2-5-vl-3b-aio-q8r16-gguf
  options:
    - qwen2-5-vl-3b-aio-q8r16-gguf

configurations:
  sleep-idle-seconds: 600
