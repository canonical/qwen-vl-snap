name: ampere-altra
summary: Optimized for Ampere Altra CPUs
vendor: Ampere Computing
devices:
  allof:
    - type: cpu
      architecture: arm64
      implementer-id: 0x41 # Arm Limited.
      part-number: 0xd0c   # Neoverse-N1
    - bus: pci
      vendor-id: 1def      # Ampere Computing, LLC
      device-id: e100      # Altra PCI Express Root Complex A

runtime: llama-aio

model:
  default: qwen2-5-vl-3b-aio-q8r16-gguf
  options:
    - qwen2-5-vl-3b-aio-q8r16-gguf

configurations:
  sleep-idle-seconds: 600
