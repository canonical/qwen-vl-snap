name: intel-cpu
summary: Optimized for Intel CPUs
description: |
  This engine uses OpenVINO Model Server.

  It is optimized for a range of Intel CPUs.
vendor: Intel Corporation
devices:
  allof:
    - type: cpu
      architecture: amd64
      manufacturer-id: GenuineIntel

runtime: openvino-model-server

model:
  default: qwen2.5-vl-3b-ov
  options:
    - qwen2.5-vl-3b-ov

configurations:
  sleep-idle-seconds: 600
