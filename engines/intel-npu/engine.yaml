name: intel-npu
summary: Optimized for Intel NPUs
description: |
  This engine uses OpenVINO Model Server.

  It is optimized for a range of Intel NPUs
vendor: Intel Corporation
devices:
  allof:
    - type: cpu
      architecture: amd64
  anyof:
    - type: npu
      vendor-id: 0x8086 # Intel Corporation
      device-id: 0x643e
      snap-connections: [ intel-npu, npu-libs ]
    - type: npu
      vendor-id: 0x8086
      device-id: 0x7d1d
      snap-connections: [ intel-npu, npu-libs ]

runtime: openvino-model-server

model:
  default: qwen2.5-vl-3b-ov-npu
  options:
    - qwen2.5-vl-3b-ov-npu

configurations:
  sleep-idle-seconds: 600
