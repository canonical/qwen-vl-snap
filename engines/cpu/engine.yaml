name: cpu
summary: Optimized for various CPUs
description: |
  This engine uses llama.cpp.

  It is optimized for both amd64 and arm64 CPU architectures, for a wide range
  of architecture variants.
vendor: Canonical Ltd
devices:
  anyof:
    - type: cpu
      architecture: amd64
    - type: cpu
      architecture: arm64

runtime: llamacpp

model:
  default: qwen2-5-vl-7b-q4-k-m-gguf
  options:
    - qwen2-5-vl-7b-q4-k-m-gguf
    - qwen2-5-vl-3b-q4-k-m-gguf

configurations:
  sleep-idle-seconds: 600
