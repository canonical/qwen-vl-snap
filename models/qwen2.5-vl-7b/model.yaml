name: qwen2.5-vl-7b
quantization: q4-k-m
disk-size: 5290M

description: |
  Qwen2.5 VL 7B Instruct in GGUF format with Q4_K_M quantization for
  multimodal text and image understanding.
model-card-url: https://huggingface.co/ggml-org/Qwen2.5-VL-7B-Instruct-GGUF

capabilities:
  - text
  - vision

components:
  - model-qwen2-5-vl-7b-instruct-q4-k-m
  - mmproj-qwen2-5-vl-7b-instruct-q8-0

environment:
  - MODEL_NAME=qwen2.5-vl-7b-instruct
  - MODEL_FILE=$SNAP_COMPONENTS/model-qwen2-5-vl-7b-instruct-q4-k-m/Qwen2.5-VL-7B-Instruct-Q4_K_M.gguf
  - MMPROJ_FILE=$SNAP_COMPONENTS/mmproj-qwen2-5-vl-7b-instruct-q8-0/mmproj-Qwen2.5-VL-7B-Instruct-Q8_0.gguf
